<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atelier Noir — Creative Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --bg-2: #111111;
  --fg: #ece8e1;
  --fg-dim: #8a857c;
  --fg-fade: #3a3832;
  --line: rgba(236, 232, 225, 0.08);
  --accent: oklch(0.78 0.14 70);
  --accent-dim: oklch(0.55 0.12 70);
  --serif: "Instrument Serif", "Times New Roman", serif;
  --sans: "Space Grotesk", system-ui, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, monospace;
}

[data-mood="bone"] {
  --bg: #f2efe8;
  --bg-2: #e8e4db;
  --fg: #1a1814;
  --fg-dim: #6a665e;
  --fg-fade: #c5bfb2;
  --line: rgba(26, 24, 20, 0.1);
}
[data-mood="ivory"] {
  --bg: #0f0d09;
  --bg-2: #17140e;
  --fg: #f5ede0;
  --fg-dim: #9a8f7a;
  --fg-fade: #403a2e;
  --line: rgba(245, 237, 224, 0.08);
}

[data-accent="rust"] { --accent: oklch(0.62 0.16 40); --accent-dim: oklch(0.45 0.14 40); }
[data-accent="sage"] { --accent: oklch(0.78 0.08 145); --accent-dim: oklch(0.55 0.07 145); }
[data-accent="ice"] { --accent: oklch(0.82 0.08 230); --accent-dim: oklch(0.6 0.08 230); }

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

body.cursor-custom, body.cursor-custom * { cursor: none !important; }

a { color: inherit; text-decoration: none; }

::selection { background: var(--accent); color: var(--bg); }

/* Grain overlay */
.grain {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.08;
  mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.5 0 0 0 0 0.5 0 0 0 0 0.5 0 0 0 0.9 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
}
body[data-grain="false"] .grain { display: none; }

/* Custom cursor */
.cursor-dot, .cursor-ring {
  position: fixed;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 10000;
  mix-blend-mode: difference;
  will-change: transform;
}
.cursor-dot {
  width: 6px; height: 6px;
  background: #fff;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}
.cursor-ring {
  width: 36px; height: 36px;
  border: 1px solid rgba(255,255,255,0.5);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width 0.3s, height 0.3s, border-color 0.3s;
}
.cursor-ring.hover { width: 60px; height: 60px; border-color: var(--accent); }
body[data-cursor="false"] .cursor-dot, body[data-cursor="false"] .cursor-ring { display: none; }
body[data-cursor="false"], body[data-cursor="false"] * { cursor: auto !important; }

/* Nav */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: 24px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  mix-blend-mode: difference;
  color: #fff;
}
.nav-logo { font-family: var(--serif); font-style: italic; font-size: 20px; text-transform: none; letter-spacing: 0; }
.nav-links { display: flex; gap: 32px; }
.nav-link { position: relative; opacity: 0.7; transition: opacity 0.3s; }
.nav-link:hover { opacity: 1; }
.nav-link .num { color: rgba(255,255,255,0.4); margin-right: 6px; }
.nav-cta { padding: 8px 16px; border: 1px solid currentColor; border-radius: 100px; }

/* Hero */
.hero {
  height: 100vh;
  min-height: 720px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hero-shape {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 1200px;
}
.hero-content {
  position: relative;
  z-index: 2;
  text-align: center;
  pointer-events: none;
}
.hero-eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--fg-dim);
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
.hero-eyebrow .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

.hero-title {
  font-family: var(--serif);
  font-size: clamp(60px, 11vw, 180px);
  line-height: 0.9;
  letter-spacing: -0.03em;
  font-weight: 400;
}
.hero-title .italic { font-style: italic; color: var(--fg-dim); }
.hero-title .line { display: block; overflow: hidden; }
.hero-title .line span {
  display: inline-block;
  animation: riseUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) both;
}
@keyframes riseUp { from { transform: translateY(110%); } to { transform: translateY(0); } }

.hero-sub {
  margin-top: 40px;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--fg-dim);
  display: flex;
  justify-content: center;
  gap: 40px;
}

.hero-scroll-hint {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--fg-dim);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.hero-scroll-hint .bar {
  width: 1px; height: 40px;
  background: linear-gradient(to bottom, var(--fg-dim), transparent);
  animation: drop 2s ease-in-out infinite;
}
@keyframes drop {
  0% { transform: scaleY(0); transform-origin: top; }
  50% { transform: scaleY(1); transform-origin: top; }
  50.01% { transform-origin: bottom; }
  100% { transform: scaleY(0); transform-origin: bottom; }
}

.hero-meta {
  position: absolute;
  bottom: 32px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--fg-dim);
  text-transform: uppercase;
}
.hero-meta.left { left: 40px; }
.hero-meta.right { right: 40px; text-align: right; }

/* Sections shared */
.section {
  padding: 160px 40px;
  position: relative;
}
.section-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--fg-dim);
  margin-bottom: 40px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-label::before {
  content: "";
  width: 40px;
  height: 1px;
  background: var(--fg-dim);
}

.reveal { opacity: 0; transform: translateY(40px); transition: opacity 1s cubic-bezier(0.2, 0.8, 0.2, 1), transform 1s cubic-bezier(0.2, 0.8, 0.2, 1); }
.reveal.in { opacity: 1; transform: translateY(0); }

.reveal-clip {
  clip-path: inset(0 100% 0 0);
  transition: clip-path 1.4s cubic-bezier(0.7, 0, 0.3, 1);
}
.reveal-clip.in { clip-path: inset(0 0 0 0); }

/* About */
.about {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  max-width: 1400px;
  margin: 0 auto;
  align-items: start;
}
.about-text {
  font-family: var(--serif);
  font-size: clamp(32px, 3.6vw, 56px);
  line-height: 1.15;
  letter-spacing: -0.02em;
}
.about-text .dim { color: var(--fg-dim); }
.about-text .italic { font-style: italic; }
.about-side {
  position: sticky;
  top: 120px;
  display: flex;
  flex-direction: column;
  gap: 48px;
}
.about-meta {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--fg-dim);
  line-height: 1.8;
}
.about-meta .k { display: block; color: var(--fg-fade); margin-bottom: 4px; }
.about-meta .v { color: var(--fg); }
.about-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  padding-top: 32px;
  border-top: 1px solid var(--line);
}
.about-stats .n {
  font-family: var(--serif);
  font-size: 56px;
  line-height: 1;
  font-style: italic;
  color: var(--accent);
}
.about-stats .l {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--fg-dim);
  margin-top: 8px;
}

/* Marquee */
.marquee {
  overflow: hidden;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 40px 0;
  white-space: nowrap;
}
.marquee-track {
  display: inline-flex;
  gap: 60px;
  animation: scroll 40s linear infinite;
}
.marquee-item {
  font-family: var(--serif);
  font-style: italic;
  font-size: 64px;
  color: var(--fg);
  display: inline-flex;
  align-items: center;
  gap: 60px;
}
.marquee-item::after {
  content: "✦";
  font-style: normal;
  color: var(--accent);
  font-size: 24px;
}
@keyframes scroll { to { transform: translateX(-50%); } }

/* Services */
.services {
  max-width: 1400px;
  margin: 0 auto;
}
.services-grid {
  display: grid;
  gap: 0;
  border-top: 1px solid var(--line);
}
.service-row {
  display: grid;
  grid-template-columns: 80px 1fr 2fr 1fr;
  gap: 40px;
  padding: 48px 0;
  border-bottom: 1px solid var(--line);
  position: relative;
  cursor: none;
  transition: padding 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.service-row:hover { padding-left: 24px; }
.service-row::before {
  content: "";
  position: absolute;
  inset: 0;
  background: var(--fg);
  transform: scaleY(0);
  transform-origin: bottom;
  transition: transform 0.5s cubic-bezier(0.7, 0, 0.3, 1);
  z-index: -1;
}
.service-row:hover::before { transform: scaleY(1); transform-origin: top; }
.service-row:hover, .service-row:hover * { color: var(--bg); }
.service-row:hover .service-arrow { transform: translateX(8px) rotate(-45deg); }

.service-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--fg-fade);
  letter-spacing: 0.1em;
}
.service-title {
  font-family: var(--serif);
  font-size: 48px;
  line-height: 1;
  letter-spacing: -0.02em;
}
.service-desc {
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.6;
  color: var(--fg-dim);
  max-width: 480px;
}
.service-tags {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--fg-dim);
  line-height: 2;
  text-align: right;
}
.service-arrow {
  font-family: var(--serif);
  font-size: 32px;
  position: absolute;
  right: 0;
  top: 48px;
  transition: transform 0.4s;
}

/* Works */
.works { max-width: 1400px; margin: 0 auto; }
.works-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 80px;
}
.works-title {
  font-family: var(--serif);
  font-size: clamp(60px, 8vw, 140px);
  line-height: 0.9;
  letter-spacing: -0.03em;
}
.works-title .italic { font-style: italic; color: var(--fg-dim); }
.works-filter {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--fg-dim);
  display: flex;
  gap: 24px;
}
.works-filter button {
  background: none;
  border: none;
  color: inherit;
  font: inherit;
  letter-spacing: inherit;
  cursor: pointer;
  padding: 4px 0;
  border-bottom: 1px solid transparent;
  transition: all 0.3s;
}
.works-filter button.active { color: var(--fg); border-bottom-color: var(--accent); }

.works-grid {
  display: grid;
  grid-template-columns: 3fr 2fr;
  grid-template-rows: auto auto auto;
  gap: 80px 60px;
}
.work {
  position: relative;
  cursor: none;
}
.work-media {
  position: relative;
  overflow: hidden;
  background: var(--bg-2);
  aspect-ratio: 4 / 5;
  margin-bottom: 24px;
}
.work-media.wide { aspect-ratio: 16 / 10; }
.work-media.tall { aspect-ratio: 3 / 4; }
.work-media.square { aspect-ratio: 1 / 1; }
.work-placeholder {
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(135deg, transparent 0 10px, rgba(255,255,255,0.03) 10px 11px);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--fg-fade);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.5s;
}
.work:hover .work-placeholder { transform: scale(1.05); filter: brightness(1.2); }
.work-overlay {
  position: absolute;
  inset: 0;
  background: rgba(10,10,10,0.5);
  opacity: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.4s;
}
.work:hover .work-overlay { opacity: 1; }
.work-play {
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 1px solid var(--fg);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--fg);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  background: rgba(10,10,10,0.4);
  backdrop-filter: blur(8px);
}
.work-info {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 24px;
}
.work-title {
  font-family: var(--serif);
  font-size: 28px;
  letter-spacing: -0.01em;
}
.work-title .italic { font-style: italic; color: var(--fg-dim); font-size: 22px; margin-left: 6px; }
.work-meta {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--fg-dim);
  text-align: right;
  line-height: 1.8;
}

.work-large { grid-column: 1; grid-row: 1 / span 2; }
.work-tall { grid-column: 2; grid-row: 1; }
.work-square { grid-column: 2; grid-row: 2; }
.work-wide { grid-column: 1 / span 2; grid-row: 3; }

/* Contact */
.contact {
  max-width: 1400px;
  margin: 0 auto;
  text-align: center;
}
.contact-eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--fg-dim);
  margin-bottom: 48px;
}
.contact-title {
  font-family: var(--serif);
  font-size: clamp(80px, 14vw, 240px);
  line-height: 0.85;
  letter-spacing: -0.04em;
  margin-bottom: 64px;
}
.contact-title .italic { font-style: italic; color: var(--fg-dim); }
.contact-email {
  display: inline-flex;
  align-items: center;
  gap: 16px;
  padding: 20px 32px;
  border: 1px solid var(--line);
  border-radius: 100px;
  font-family: var(--mono);
  font-size: 14px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: all 0.4s;
  cursor: none;
}
.contact-email:hover { border-color: var(--accent); color: var(--accent); padding-right: 40px; }
.contact-email .arrow { transition: transform 0.4s; }
.contact-email:hover .arrow { transform: translateX(8px); }

/* Footer */
.footer {
  padding: 48px 40px 32px;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--fg-dim);
}
.footer-big {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(60px, 10vw, 160px);
  text-transform: none;
  letter-spacing: -0.03em;
  color: var(--fg);
  line-height: 0.9;
  margin-bottom: 40px;
}
.footer-cols {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 40px;
  padding-bottom: 48px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 24px;
}
.footer-col h4 {
  color: var(--fg-fade);
  margin-bottom: 16px;
  font-weight: 400;
}
.footer-col a { display: block; color: var(--fg); padding: 4px 0; transition: color 0.3s; }
.footer-col a:hover { color: var(--accent); }

/* Tweaks panel */
.tweaks {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 280px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 20px;
  z-index: 10001;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  backdrop-filter: blur(12px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
.tweaks-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
  text-transform: uppercase;
  color: var(--fg-dim);
}
.tweaks-header button {
  background: none; border: none; color: var(--fg-dim); cursor: pointer; font-size: 14px;
}
.tweak-row { margin-bottom: 16px; }
.tweak-row label {
  display: block;
  color: var(--fg-dim);
  text-transform: uppercase;
  margin-bottom: 8px;
  font-size: 10px;
}
.tweak-opts { display: flex; gap: 6px; flex-wrap: wrap; }
.tweak-opt {
  flex: 1;
  min-width: 50px;
  padding: 8px 10px;
  background: transparent;
  border: 1px solid var(--line);
  color: var(--fg-dim);
  border-radius: 6px;
  cursor: pointer;
  font: inherit;
  font-size: 10px;
  text-transform: uppercase;
  transition: all 0.2s;
}
.tweak-opt:hover { border-color: var(--fg-dim); }
.tweak-opt.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
.tweak-swatch { width: 18px; height: 18px; border-radius: 50%; display: inline-block; vertical-align: middle; }

@media (max-width: 900px) {
  .about { grid-template-columns: 1fr; gap: 40px; }
  .about-side { position: static; }
  .service-row { grid-template-columns: 40px 1fr; }
  .service-desc, .service-tags { grid-column: 2; text-align: left; }
  .works-grid { grid-template-columns: 1fr; }
  .work-large, .work-tall, .work-square, .work-wide { grid-column: 1; grid-row: auto; }
  .footer-cols { grid-template-columns: 1fr 1fr; }
  .nav-links { display: none; }
}

</style>
</head>

<div id="root"></div>

  "shape": "torus"
}/*EDITMODE-END*/;
</script>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
